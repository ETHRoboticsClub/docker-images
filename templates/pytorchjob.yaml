apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: rl-training-job
  namespace: default
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: ghcr.io/ethroboticsclub/pytorch:latest
              resources:
                limits:
                  nvidia.com/gpu: 1
                requests:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
              command:
                - python
                - /workspace/train.py
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: training-workspace
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: ghcr.io/ethroboticsclub/pytorch:latest
              resources:
                limits:
                  nvidia.com/gpu: 1
                requests:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
              command:
                - python
                - /workspace/train.py
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: training-workspace
